openapi: 3.1.0
info:
  title: Synapse™ Gateway API
  description: |
    Synapse Gateway provides a unified API gateway for LLM services with semantic caching capabilities.

    ## Features
    - **Semantic Cache**: Automatic caching of LLM responses with vector similarity matching
    - **Multi-Provider Support**: Compatible with OpenAI, Anthropic, Google Gemini, and Cohere APIs
    - **Request Coalescing**: Deduplicate concurrent identical requests
    - **Streaming Support**: Server-Sent Events (SSE) for real-time responses
    - **Agentic Caching**: MCP server management with tool result caching and cascade invalidation

    ## Provider Compatibility
    Synapse supports drop-in replacement for multiple LLM provider APIs:
    - **OpenAI**: `/v1/chat/completions`, `/v1/models`
    - **Anthropic**: `/v1/messages`
    - **Google Gemini**: `/v1beta/models/{model}/generateContent`, etc.
    - **Cohere**: `/v1/chat`, `/v1/generate`, `/v1/embed`

    ## Authentication
    All API endpoints (except health checks) require Bearer token authentication.
    Include your API key in the Authorization header:
    ```
    Authorization: Bearer YOUR_API_KEY
    ```

    ## Synapse Metadata Extension
    All responses include optional `synapse_metadata` (OpenAI/Anthropic) or `synapse` (Gemini/Cohere)
    fields with cache hit information, similarity scores, and latency metrics.

    ## Cache Bypass
    Use the `X-Synapse-Skip-Cache` header to bypass the semantic cache entirely:
    - Skips embedding generation (saves 50-200ms)
    - Skips L1/L2 cache lookups
    - Forwards directly to LLM provider
    - Skips cache writes (response not cached)
    - Response includes `source: "bypass"` and `X-Synapse-Cache-Status: BYPASS` header

    This is useful for:
    - Testing LLM providers directly
    - Queries that should never be cached
    - Debugging cache behavior
  version: 0.2.0
  contact:
    name: WorldFlow AI
    url: https://worldflowai.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0


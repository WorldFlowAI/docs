  # ==========================================================================
  # Anthropic Compatible API
  # ==========================================================================
  /v1/messages:
    post:
      summary: Create Message (Anthropic Compatible)
      description: |
        Anthropic-compatible messages endpoint. Supports both streaming and non-streaming responses.

        **Usage with Anthropic SDK:**
        ```python
        import anthropic

        client = anthropic.Anthropic(
            base_url="https://your-synapse.example.com/v1",
            api_key="YOUR_SYNAPSE_API_KEY"
        )

        message = client.messages.create(
            model="claude-sonnet-4-5",
            max_tokens=1024,
            messages=[{"role": "user", "content": "Hello!"}]
        )
        ```

        **Streaming:**
        Set `stream: true` to receive Server-Sent Events (SSE) in Anthropic format.

        **Cache Bypass:**
        Set `X-Synapse-Skip-Cache: true` header to bypass cache.

        **Note:** The `max_tokens` parameter is required (as per Anthropic API spec).
      operationId: createMessage
      tags: [Anthropic Compatible]
      parameters:
        - $ref: '#/components/parameters/SkipCacheHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnthropicMessagesRequest'
            examples:
              simple:
                summary: Simple message
                value:
                  model: "claude-sonnet-4-5"
                  max_tokens: 1024
                  messages:
                    - role: "user"
                      content: "What is AI?"
              with_system:
                summary: With system prompt
                value:
                  model: "claude-sonnet-4-5"
                  max_tokens: 2048
                  system: "You are a helpful coding assistant."
                  messages:
                    - role: "user"
                      content: "Write a Python function to calculate factorial"
                  temperature: 0.5
              streaming:
                summary: Streaming response
                value:
                  model: "claude-sonnet-4-5"
                  max_tokens: 1024
                  messages:
                    - role: "user"
                      content: "Explain machine learning"
                  stream: true
              multimodal:
                summary: With image (Vision)
                value:
                  model: "claude-sonnet-4-5"
                  max_tokens: 1024
                  messages:
                    - role: "user"
                      content:
                        - type: "text"
                          text: "What's in this image?"
                        - type: "image"
                          source:
                            type: "base64"
                            media_type: "image/png"
                            data: "iVBORw0KGgo..."
      responses:
        '200':
          description: Message response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicMessagesResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of Anthropic events
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicError'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicError'


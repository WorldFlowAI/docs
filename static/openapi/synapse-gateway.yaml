  # ==========================================================================
  # Rate Limits API
  # ==========================================================================
  /api/v1/rate-limits:
    get:
      summary: List Tenant Tier Assignments
      description: |
        Returns all tenant tier assignments across the system.
        Requires `ViewMetrics` permission.
      operationId: listTenantTierAssignments
      tags: [Rate Limits]
      responses:
        '200':
          description: List of tenant tier assignments
          content:
            application/json:
              schema:
                type: object
                required: [assignments, total]
                properties:
                  assignments:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantTierResponse'
                  total:
                    type: integer
                    description: Total number of assignments
              example:
                assignments:
                  - tenantId: "acme-corp"
                    tier: "enterprise"
                    explicit: true
                    limits:
                      rps: 100
                      rpm: 3000
                      tpm: 2000000
                      rpd: 100000
                      burstMultiplier: 2.0
                total: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ViewMetrics permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/rate-limits/tiers:
    get:
      summary: List Available Tiers
      description: |
        Returns all available rate limit tiers and the default tier.
        Requires `ViewMetrics` permission.
      operationId: listRateLimitTiers
      tags: [Rate Limits]
      responses:
        '200':
          description: Available tiers and default
          content:
            application/json:
              schema:
                type: object
                required: [tiers, defaultTier]
                properties:
                  tiers:
                    type: array
                    items:
                      type: object
                      required: [name, limits]
                      properties:
                        name:
                          $ref: '#/components/schemas/RateLimitTier'
                        limits:
                          $ref: '#/components/schemas/TierLimits'
                  defaultTier:
                    type: string
                    description: Name of the default tier assigned to new tenants
              example:
                tiers:
                  - name: "starter"
                    limits:
                      rps: 10
                      rpm: 100
                      tpm: 100000
                      rpd: 5000
                      burstMultiplier: 1.5
                  - name: "pro"
                    limits:
                      rps: 50
                      rpm: 1000
                      tpm: 1000000
                      rpd: 50000
                      burstMultiplier: 1.5
                  - name: "enterprise"
                    limits:
                      rps: 100
                      rpm: 3000
                      tpm: 2000000
                      rpd: 100000
                      burstMultiplier: 2.0
                defaultTier: "starter"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ViewMetrics permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/rate-limits/{tenant_id}:
    get:
      summary: Get Tenant Tier
      description: |
        Returns the rate limit tier and limits for a specific tenant.
        If no explicit tier is assigned, returns the default tier.
        Requires `ViewMetrics` permission.
      operationId: getTenantTier
      tags: [Rate Limits]
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant identifier
          schema:
            type: string
          example: "acme-corp"
      responses:
        '200':
          description: Tenant tier information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantTierResponse'
              example:
                tenantId: "acme-corp"
                tier: "enterprise"
                explicit: true
                limits:
                  rps: 100
                  rpm: 3000
                  tpm: 2000000
                  rpd: 100000
                  burstMultiplier: 2.0
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ViewMetrics permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Set Tenant Tier
      description: |
        Assigns a rate limit tier to a tenant.
        Requires `ManageConfig` permission.
      operationId: setTenantTier
      tags: [Rate Limits]
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant identifier
          schema:
            type: string
          example: "acme-corp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTenantTierRequest'
            example:
              tier: "enterprise"
      responses:
        '200':
          description: Tenant tier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantTierResponse'
        '400':
          description: Invalid tier name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ManageConfig permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove Tenant Tier Assignment
      description: |
        Removes an explicit tier assignment from a tenant.
        The tenant will fall back to the default tier.
        Requires `ManageConfig` permission.
      operationId: removeTenantTier
      tags: [Rate Limits]
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant identifier
          schema:
            type: string
          example: "acme-corp"
      responses:
        '200':
          description: Tier assignment removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TierActionResponse'
              example:
                success: true
                message: "Tier assignment removed for tenant acme-corp"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ManageConfig permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'



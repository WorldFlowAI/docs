    description: Schema transition management for zero-downtime upgrades
  - name: Privacy
    description: GDPR privacy endpoints for consent, erasure with Merkle proof, data export, and subject data lookup
  - name: Thresholds
    description: Cache similarity threshold configuration, tenant overrides, and simulation
  - name: Roles
    description: Role-based access control assignment and revocation
  - name: Coalescer
    description: Request coalescing statistics and flush control
  - name: MCP Connections
    description: MCP client connection lifecycle management and real-time events
  - name: Tool Cache
    description: Semantic tool result caching with entity-based invalidation
  - name: Context Cache
    description: Multi-turn conversation caching with two-stage retrieval
  - name: Pilots

  # ==========================================================================
  # Cohere Compatible API
  # ==========================================================================
  /v1/chat:
    post:
      summary: Chat (Cohere Compatible)
      description: |
        Cohere-compatible chat endpoint. Supports both streaming and non-streaming responses.

        **Streaming:**
        Set `stream: true` to receive Server-Sent Events in Cohere's event format.

        **Cache Bypass:**
        Set `X-Synapse-Skip-Cache: true` header to bypass cache.
      operationId: cohereChat
      tags: [Cohere Compatible]
      parameters:
        - $ref: '#/components/parameters/SkipCacheHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohereChatRequest'
            examples:
              simple:
                summary: Simple chat
                value:
                  message: "What is machine learning?"
                  model: "command-r-plus"
              with_history:
                summary: With chat history
                value:
                  message: "Tell me more about neural networks"
                  model: "command-r-plus"
                  chat_history:
                    - role: "USER"
                      message: "What is machine learning?"
                    - role: "CHATBOT"
                      message: "Machine learning is..."
              with_preamble:
                summary: With preamble (system prompt)
                value:
                  message: "Explain quantum computing"
                  model: "command-r-plus"
                  preamble: "You are a helpful physics tutor."
                  temperature: 0.7
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohereChatResponse'
            text/event-stream:
              schema:
                type: string

  /v1/generate:
    post:
      summary: Generate (Cohere Compatible)
      description: |
        Cohere-compatible text generation endpoint (legacy).
        For new integrations, prefer using `/v1/chat`.
      operationId: cohereGenerate
      tags: [Cohere Compatible]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohereGenerateRequest'
            example:
              prompt: "Once upon a time"
              model: "command"
              max_tokens: 500
              temperature: 0.9
      responses:
        '200':
          description: Generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohereGenerateResponse'

  /v1/embed:
    post:
      summary: Embed (Cohere Compatible)
      description: Generate embeddings for a list of texts
      operationId: cohereEmbed
      tags: [Cohere Compatible]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohereEmbedRequest'
            example:
              texts:
                - "Hello world"
                - "Machine learning is fascinating"
              model: "embed-english-v3.0"
              input_type: "search_document"
      responses:
        '200':
          description: Embedding result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohereEmbedResponse'

  # ==========================================================================

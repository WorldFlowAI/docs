    description: Anthropic API-compatible endpoints
  - name: Gemini Compatible
    description: Google Gemini API-compatible endpoints
  - name: Cohere Compatible
    description: Cohere API-compatible endpoints
  - name: MCP Server Management
    description: |
      MCP (Model Context Protocol) Server Management API for agentic caching.

      Enables enterprises to:
      - Register and monitor MCP servers
      - Discover tools automatically via `tools/list`
      - Configure caching behavior per tool
      - Define entity dependencies for cache invalidation
      - Auto-generate invalidation rules based on entity relationships

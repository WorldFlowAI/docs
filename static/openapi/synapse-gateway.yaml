  # ==========================================================================
  # OpenAI Compatible API
  # ==========================================================================
  /v1/chat/completions:
    post:
      summary: Create Chat Completion (OpenAI Compatible)
      description: |
        OpenAI-compatible chat completions endpoint. Supports both streaming and non-streaming responses.

        **Usage with OpenAI SDK:**
        ```python
        from openai import OpenAI

        client = OpenAI(
            base_url="https://your-synapse.example.com/v1",
            api_key="YOUR_SYNAPSE_API_KEY"
        )

        response = client.chat.completions.create(
            model="gpt-4o",
            messages=[{"role": "user", "content": "Hello!"}]
        )
        ```

        **Streaming:**
        Set `stream: true` to receive Server-Sent Events (SSE).

        **Cache Bypass:**
        Set `X-Synapse-Skip-Cache: true` header to bypass cache (forward directly to LLM).

        **Response Headers:**
        - `X-Synapse-Cache-Status: HIT-L1` / `HIT-L2` / `MISS` / `BYPASS` - Cache status
        - `X-Cache-Similarity: 0.95` - Similarity score for cache hits
        - `X-Coalesced: original` / `piggybacked` - Request coalescing status
      operationId: createChatCompletion
      tags: [OpenAI Compatible]
      parameters:
        - $ref: '#/components/parameters/SkipCacheHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAIChatRequest'
            examples:
              simple:
                summary: Simple chat
                value:
                  model: "gpt-4o"
                  messages:
                    - role: "user"
                      content: "What is AI?"
              with_system:
                summary: With system prompt
                value:
                  model: "gpt-4o"
                  messages:
                    - role: "system"
                      content: "You are a helpful assistant."
                    - role: "user"
                      content: "Explain quantum computing"
                  temperature: 0.7
                  max_tokens: 1000
              streaming:
                summary: Streaming response
                value:
                  model: "gpt-4o"
                  messages:
                    - role: "user"
                      content: "Write a poem about caching"
                  stream: true
              with_tools:
                summary: With function calling
                value:
                  model: "gpt-4o"
                  messages:
                    - role: "user"
                      content: "What's the weather in Paris?"
                  tools:
                    - type: "function"
                      function:
                        name: "get_weather"
                        description: "Get the current weather"
                        parameters:
                          type: "object"
                          properties:
                            location:
                              type: "string"
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIChatResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of OpenAIStreamChunk events
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'

  /v1/models:
    get:
      summary: List Models (OpenAI Compatible)

          in: query
          description: Filter by resource type (e.g., user, group)
          schema:
            type: string
        - name: status
          in: query
          description: Filter by status (e.g., success, error)
          schema:
            type: string
        - name: startDate
          in: query
          description: Start date filter (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: End date filter (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        '200':
          description: Paginated list of SCIM activities
          content:
            application/json:

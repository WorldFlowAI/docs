  # ==========================================================================
  # SCIM Endpoints
  # ==========================================================================
  /api/v1/scim/tokens:
    get:
      summary: List SCIM tokens
      description: List SCIM provisioning tokens for the authenticated workspace.
      operationId: listScimTokens
      tags: [SCIM]
      parameters:
        - name: status
          in: query
          description: Filter by token status
          schema:
            type: string
            enum: [active, revoked, expired]
        - name: name
          in: query
          description: Search by name (partial match)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        '200':
          description: Paginated list of SCIM tokens
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScimTokenResponse'
                  pagination:
                    $ref: '#/components/schemas/ScimPaginationMeta'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
    post:
      summary: Create SCIM token
      description: |
        Create a new SCIM provisioning token. The plain token value is returned
        exactly once in the response. After creation, only the masked prefix is available.
      operationId: createScimToken
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScimTokenRequest'
      responses:
        '200':
          description: Token created (plain value shown only once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateScimTokenResponse'
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '409':
          description: Token with this name already exists

  /api/v1/scim/tokens/{id}:
    get:
      summary: Get SCIM token
      description: Get a single SCIM token by ID.
      operationId: getScimToken
      tags: [SCIM]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimTokenResponse'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Token not found
    delete:
      summary: Delete SCIM token
      description: Permanently delete a SCIM token and its associated activity logs.
      operationId: deleteScimToken
      tags: [SCIM]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Token not found

  /api/v1/scim/tokens/{id}/revoke:
    post:
      summary: Revoke SCIM token
      description: Revoke an active SCIM token, preventing further use.
      operationId: revokeScimToken
      tags: [SCIM]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimTokenResponse'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Active token not found


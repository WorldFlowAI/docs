          description: User ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        API key authentication. Include your API key in the Authorization header:
        `Authorization: Bearer YOUR_API_KEY`

  parameters:
    SkipCacheHeader:
      name: X-Synapse-Skip-Cache
      in: header
      required: false
      description: |
        Bypass the semantic cache entirely. When set to "true" or "1":
        - Skips embedding generation
        - Skips L1/L2 cache lookups
        - Forwards directly to LLM provider
        - Skips cache writes (response not cached)
        - Response includes `X-Synapse-Cache-Status: BYPASS` header
      schema:
        type: string
        enum: ["true", "false", "1", "0"]
        default: "false"

    PageParam:
      name: page
      in: query
      description: Page number (1-indexed, default 1)
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      description: Page size (default 20, max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    McpServerIdParam:
      name: id
      in: path
      required: true
      description: MCP Server ID
      schema:
        type: string
        format: uuid

  schemas:
    # ==========================================================================
    # System Schemas
    # ==========================================================================
    ApiInfo:
      type: object
      properties:
        service:
          type: string
          example: "Synapse Gateway"
        version:
          type: string
          example: "0.2.0"
        description:
          type: string
          example: "API Gateway for Synapse Semantic Cache"
        endpoints:
          type: object
          additionalProperties:
            type: string
        documentation:
          type: object
          properties:
            openapi:
              type: string
            swagger:
              type: string

    HealthResponse:
      type: object
      required: [status, version, service]
      properties:
        status:
          type: string
          enum: [healthy]
          example: "healthy"
        version:
          type: string
          example: "0.2.0"
        service:
          type: string
          example: "synapse-gateway"

    ReadyResponse:
      type: object
      required: [ready, components, uptime_secs]
      properties:
        ready:
          type: boolean
          description: Overall readiness status
        components:
          $ref: '#/components/schemas/ReadyComponents'
        uptime_secs:
          type: integer
          format: int64
          description: Uptime in seconds

    ReadyComponents:
      type: object
      required: [gateway, proxy, healthy_proxies, total_proxies]
      properties:
        gateway:
          type: boolean
          description: Gateway component status
        proxy:
          type: boolean
          description: Proxy connectivity status
        healthy_proxies:
          type: integer
          description: Number of healthy proxy instances
        total_proxies:
          type: integer
          description: Total number of proxy instances

    StatsResponse:
      type: object
      properties:
        uptime_secs:
          type: integer
          format: int64
        proxy_health:
          type: array
          items:
            $ref: '#/components/schemas/ProxyHealth'
        rate_limiting_enabled:
          type: boolean
        auth_enabled:
          type: boolean

    ProxyHealth:
      type: object
      properties:
        url:
          type: string
        healthy:
          type: boolean
        latency_ms:
          type: integer
          format: int64
          nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: string

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
        serverId:
          type: string
        entityId:
          type: string
        ruleId:
          type: string

    SuccessResponse:
      type: object
      properties:
        message:
          type: string

    # ==========================================================================
    # MCP Server Management Schemas
    # ==========================================================================
    McpServerStatus:
      type: string
      enum: [PENDING, HEALTHY, DEGRADED, DOWN, DISABLED]
      description: |
        - PENDING: Server registered but not yet verified
        - HEALTHY: Server responding normally
        - DEGRADED: Server responding with elevated latency or errors
        - DOWN: Server not responding
        - DISABLED: Manually disabled by admin

    McpTransport:
      type: string
      enum: [HTTP, STDIO, SSE]
      default: HTTP
      description: MCP transport protocol

    McpAuthType:
      type: string
      enum: [NONE, API_KEY, OAUTH, MTLS]
      default: NONE
      description: Authentication method for MCP server connection

    McpToolCategory:
      type: string
      enum: [READ, WRITE, IDEMPOTENT, UNKNOWN]
      description: |
        Tool classification for caching behavior:
        - READ: Read-only tool, results can be cached
        - WRITE: Write tool, triggers cache invalidation
        - IDEMPOTENT: Safely cacheable with same inputs
        - UNKNOWN: Not yet classified

    McpOperation:
      type: string
      enum: [READ, WRITE]
      description: Tool-entity relationship operation type

    McpAuthConfig:
      type: object
      description: Authentication configuration (type-specific)
      properties:
        type:
          type: string
          enum: [NONE, API_KEY, OAUTH, MTLS]
        header:
          type: string
          description: HTTP header name (for API_KEY)
        valueEnv:
          type: string
          description: Environment variable containing the value
        tokenUrl:
          type: string
          description: OAuth token endpoint URL
        clientId:
          type: string
          description: OAuth client ID
        clientSecretEnv:
          type: string
          description: Environment variable for client secret
        scopes:
          type: array
          items:
            type: string
          description: OAuth scopes
        certPath:
          type: string
          description: mTLS certificate path
        keyPath:
          type: string
          description: mTLS key path
        caPath:
          type: string
          description: mTLS CA certificate path

    McpToolCacheConfig:
      type: object
      description: Tool caching configuration
      required: [enabled, ttlSecs, semanticThreshold, crossAgent, coalescingWindowMs]
      properties:
        enabled:
          type: boolean
          description: Whether caching is enabled
        ttlSecs:
          type: integer
          description: Cache TTL in seconds
        semanticThreshold:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Minimum similarity for semantic cache hit (0.0-1.0)
        crossAgent:
          type: boolean
          description: Share cache entries across agents
        coalescingWindowMs:
          type: integer
          description: Coalescing window in milliseconds

    CreateMcpServerRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
          maxLength: 128
          description: Human-readable name
        description:
          type: string
          maxLength: 2000
          description: Optional description
        url:
          type: string
          maxLength: 2048
          description: Server URL
        transport:
          $ref: '#/components/schemas/McpTransport'
        authType:
          $ref: '#/components/schemas/McpAuthType'
        authConfig:
          $ref: '#/components/schemas/McpAuthConfig'

    CreateMcpServerResponse:
      type: object
      properties:
        server:
          $ref: '#/components/schemas/McpServerResponse'
        message:
          type: string

    McpServerResponse:
      type: object
      required: [id, name, url, transport, authType, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        url:
          type: string
        transport:
          $ref: '#/components/schemas/McpTransport'
        authType:
          $ref: '#/components/schemas/McpAuthType'
        status:
          $ref: '#/components/schemas/McpServerStatus'
        healthLatencyP50Ms:
          type: integer
        healthLatencyP99Ms:
          type: integer
        lastHealthCheck:
          type: string
          format: date-time
        lastError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    McpServerListResponse:
      type: object
      required: [servers, total, page, pageSize, totalPages]
      properties:
        servers:
          type: array
          items:
            $ref: '#/components/schemas/McpServerResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    McpServerHealthResponse:
      type: object
      required: [serverId, status, checkedAt]
      properties:
        serverId:
          type: string
        status:
          $ref: '#/components/schemas/McpServerStatus'
        latencyP50Ms:
          type: integer
        latencyP99Ms:
          type: integer
        error:
          type: string
        checkedAt:
          type: string
          format: date-time

    McpDiscoveryResponse:
      type: object
      required: [serverId, toolsDiscovered, toolsAdded, toolsUpdated, tools]
      properties:
        serverId:
          type: string
        toolsDiscovered:
          type: integer
          format: int64
        toolsAdded:
          type: integer
          format: int64
        toolsUpdated:
          type: integer
          format: int64
        tools:
          type: array
          items:
            $ref: '#/components/schemas/McpToolResponse'

    McpToolResponse:
      type: object
      required: [id, serverId, name, category, categoryManualOverride, cacheConfig, createdAt, updatedAt]
      properties:
        id:
          type: string
        serverId:
          type: string
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: object
        category:
          $ref: '#/components/schemas/McpToolCategory'
        categoryConfidence:
          type: number
          format: float
        categoryManualOverride:
          type: boolean
        cacheConfig:
          $ref: '#/components/schemas/McpToolCacheConfig'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    McpToolListResponse:
      type: object
      required: [tools, total, page, pageSize, totalPages]
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/McpToolResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    UpdateToolConfigRequest:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/McpToolCategory'
        cacheEnabled:
          type: boolean
        cacheTtlSecs:
          type: integer
        semanticThreshold:
          type: number
          format: float
          minimum: 0
          maximum: 1
        crossAgentEnabled:
          type: boolean
        coalescingWindowMs:
          type: integer

    McpEntityResponse:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    McpEntityListResponse:
      type: object
      required: [entities, total, page, pageSize, totalPages]
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/McpEntityResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    CreateEntityRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
        parentId:
          type: string
          format: uuid

    UpdateEntityRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true

    McpToolEntityResponse:
      type: object
      required: [toolId, entityId, paramName, operation]
      properties:
        toolId:
          type: string
        entityId:
          type: string
        paramName:
          type: string
        operation:
          $ref: '#/components/schemas/McpOperation'

    CreateToolEntityRequest:
      type: object
      required: [toolId, entityId, paramName, operation]
      properties:
        toolId:
          type: string
          format: uuid
        entityId:
          type: string
          format: uuid
        paramName:
          type: string
        operation:
          $ref: '#/components/schemas/McpOperation'

    McpRuleResponse:
      type: object
      required: [id, writeToolId, invalidateToolId, enabled, createdAt]
      properties:
        id:
          type: string
        writeToolId:
          type: string
        invalidateToolId:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    McpRuleListResponse:
      type: object
      required: [rules, total, page, pageSize, totalPages]
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/McpRuleResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    CreateRuleRequest:
      type: object
      required: [writeToolId, invalidateToolId]
      properties:
        writeToolId:
          type: string
          format: uuid
        invalidateToolId:
          type: string
          format: uuid
        enabled:
          type: boolean
          default: true

    UpdateRuleRequest:
      type: object
      properties:
        enabled:
          type: boolean

    GenerateRulesResponse:
      type: object
      required: [rulesGenerated, rulesSkipped, generatedRules, message]
      properties:
        rulesGenerated:
          type: integer
          format: int64
        rulesSkipped:
          type: integer
          format: int64
        generatedRules:
          type: array
          items:
            $ref: '#/components/schemas/GeneratedRule'
        message:
          type: string

    GeneratedRule:
      type: object
      required: [writeToolId, writeToolName, invalidateToolId, invalidateToolName, sharedEntities]
      properties:
        writeToolId:
          type: string
        writeToolName:
          type: string
        invalidateToolId:
          type: string
        invalidateToolName:
          type: string
        sharedEntities:
          type: array
          items:
            type: string

    McpAnalyticsResponse:
      type: object
      required: [summary, byServer, byTool, trend, executionTimeMs]
      properties:
        summary:
          $ref: '#/components/schemas/McpAnalyticsSummary'
        byServer:
          type: array
          items:
            $ref: '#/components/schemas/McpServerAnalytics'
        byTool:
          type: array
          items:
            $ref: '#/components/schemas/McpToolAnalytics'
        trend:
          type: array
          items:
            $ref: '#/components/schemas/McpAnalyticsDataPoint'
        executionTimeMs:
          type: integer
          format: int64

    McpAnalyticsSummary:
      type: object
      required: [totalCalls, cacheHits, cacheMisses, hitRate, avgLatencyCacheMs, avgLatencyMissMs, estimatedTimeSavedMs, estimatedCostSaved]
      properties:
        totalCalls:
          type: integer
          format: int64
        cacheHits:
          type: integer
          format: int64
        cacheMisses:
          type: integer
          format: int64
        hitRate:
          type: number
          format: double
        avgLatencyCacheMs:
          type: number
          format: double
        avgLatencyMissMs:
          type: number
          format: double
        estimatedTimeSavedMs:
          type: integer
          format: int64
        estimatedCostSaved:
          type: number
          format: double

    McpServerAnalytics:
      type: object
      required: [serverId, serverName, totalCalls, cacheHits, hitRate, toolCount]
      properties:
        serverId:
          type: string
        serverName:
          type: string
        totalCalls:
          type: integer
          format: int64
        cacheHits:
          type: integer
          format: int64
        hitRate:
          type: number
          format: double
        toolCount:
          type: integer
          format: int64

    McpToolAnalytics:
      type: object
      required: [toolId, toolName, serverId, category, totalCalls, cacheHits, hitRate, avgLatencyMs]
      properties:
        toolId:
          type: string
        toolName:
          type: string
        serverId:
          type: string
        category:
          type: string
        totalCalls:
          type: integer
          format: int64
        cacheHits:
          type: integer
          format: int64
        hitRate:
          type: number
          format: double
        avgLatencyMs:
          type: number
          format: double

    McpAnalyticsDataPoint:
      type: object
      required: [period, totalCalls, cacheHits, cacheMisses, hitRate]
      properties:
        period:
          type: string
          format: date-time
        totalCalls:
          type: integer
          format: int64
        cacheHits:
          type: integer
          format: int64
        cacheMisses:
          type: integer
          format: int64
        hitRate:
          type: number
          format: double

    # ==========================================================================
    # Analytics Schemas
    # ==========================================================================
    SavingsResponse:
      type: object
      required: [data, summary, metadata]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SavingsDataPoint'
        summary:
          $ref: '#/components/schemas/SavingsSummary'
        metadata:
          $ref: '#/components/schemas/SavingsMetadata'

    SavingsDataPoint:
      type: object
      required: [period, totalRequests, cacheHits, cacheMisses, hitRate, tokensSaved, estimatedSavings, actualCost]
      properties:
        period:
          type: string
          format: date-time
        totalRequests:
          type: integer
          format: int64
        cacheHits:
          type: integer
          format: int64
        cacheMisses:
          type: integer
          format: int64
        hitRate:
          type: number
          format: double
        tokensSaved:
          type: integer
          format: int64
        estimatedSavings:
          type: number
          format: double
        actualCost:
          type: number
          format: double

    SavingsSummary:
      type: object
      properties:
        totalRequests:
          type: integer
          format: int64
        totalCacheHits:
          type: integer
          format: int64
        overallHitRate:
          type: number
          format: double
        totalTokensSaved:
          type: integer
          format: int64
        totalEstimatedSavings:
          type: number
          format: double
        totalActualCost:
          type: number
          format: double

    SavingsMetadata:
      type: object
      properties:
        granularity:
          type: string
        tenantId:
          type: string
        model:
          type: string
        executionTimeMs:
          type: integer
          format: int64

    # ==========================================================================
    # Guardrails Schemas
    # ==========================================================================
    GuardType:
      type: string
      enum: [INPUT, OUTPUT, BOTH]
      description: Type of guard (input, output, or both)

    GuardCategory:
      type: string
      enum: [PII, CONTENT_MODERATION, SAFETY, CUSTOM]
      description: Category of the guardrail

    GuardAction:
      type: string
      enum: [BLOCK, REDACT, WARN, LOG]
      description: Action to take when guardrail is triggered

    RuleType:
      type: string
      enum: [REGEX, KEYWORD, ML_MODEL, CUSTOM]
      description: Type of matching rule

    GuardrailResponse:
      type: object
      required: [id, name, guardType, category, enabled, action, priority, rules, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        guardType:
          $ref: '#/components/schemas/GuardType'
        category:
          $ref: '#/components/schemas/GuardCategory'
        enabled:
          type: boolean
        action:
          $ref: '#/components/schemas/GuardAction'
        priority:
          type: integer
        rules:
          type: array
          items:
            $ref: '#/components/schemas/RuleResponse'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RuleResponse:
      type: object
      required: [id, guardrailId, ruleType, config, createdAt]
      properties:
        id:
          type: string
        guardrailId:
          type: string
        ruleType:
          $ref: '#/components/schemas/RuleType'
        config:
          type: object
        createdAt:
          type: string
          format: date-time

    GuardrailListResponse:
      type: object
      required: [guardrails, total, page, pageSize, totalPages]
      properties:
        guardrails:
          type: array
          items:
            $ref: '#/components/schemas/GuardrailResponse'
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    CreateGuardrailRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        guardType:
          $ref: '#/components/schemas/GuardType'
        category:
          $ref: '#/components/schemas/GuardCategory'
        enabled:
          type: boolean
        action:
          $ref: '#/components/schemas/GuardAction'
        priority:
          type: integer
        rules:
          type: array
          items:
            $ref: '#/components/schemas/CreateRuleInput'

    CreateRuleInput:
      type: object
      required: [ruleType, config]
      properties:
        ruleType:
          $ref: '#/components/schemas/RuleType'
        config:
          type: object

    UpdateGuardrailRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        guardType:
          $ref: '#/components/schemas/GuardType'
        category:
          $ref: '#/components/schemas/GuardCategory'
        enabled:
          type: boolean
        action:
          $ref: '#/components/schemas/GuardAction'
        priority:
          type: integer
        rules:
          type: array
          items:
            $ref: '#/components/schemas/CreateRuleInput'

    TestGuardrailRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
        direction:
          type: string
          enum: [INPUT, OUTPUT]

    TestGuardrailResponse:
      type: object
      required: [triggered, action, matches, processingTimeMs]
      properties:
        triggered:
          type: boolean
        action:
          $ref: '#/components/schemas/GuardAction'
        matches:
          type: array
          items:
            $ref: '#/components/schemas/GuardrailMatch'
        processingTimeMs:
          type: integer

    GuardrailMatch:
      type: object
      properties:
        ruleId:
          type: string
        ruleType:
          $ref: '#/components/schemas/RuleType'
        matchedText:
          type: string
        startIndex:
          type: integer
        endIndex:
          type: integer
        confidence:
          type: number
          format: float

    # ==========================================================================
    # Playground Schemas
    # ==========================================================================
    VariationRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 10000
        model:
          type: string
        threshold:
          type: number
          format: float
          minimum: 0
          maximum: 1

    VariationResponse:
      type: object
      properties:
        originalQuery:
          type: string
        variations:
          type: array
          items:
            $ref: '#/components/schemas/QueryVariation'
        cacheGroups:
          type: array
          items:
            $ref: '#/components/schemas/CacheGroup'
        processingTimeMs:
          type: integer

    QueryVariation:
      type: object
      properties:
        query:
          type: string
        similarity:
          type: number
          format: float
        prediction:
          $ref: '#/components/schemas/CachePrediction'

    CachePrediction:
      type: object
      properties:
        willHitCache:
          type: boolean
        tier:
          type: string
          enum: [L1, L2, MISS]
        confidence:
          type: number
          format: float

    CacheGroup:
      type: object
      properties:
        representative:
          type: string
        members:
          type: array
          items:
            type: string
        similarity:
          type: number
          format: float

    # ==========================================================================
    # Synapse Native Schemas
    # ==========================================================================
    QueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: The query text
          example: "What is the capital of France?"
        model:
          type: string
          description: Model to use for generation
          example: "gpt-4o"
        parameters:
          type: object
          description: Additional parameters for the LLM
          additionalProperties: true

    QueryResponse:
      type: object
      required: [response, cache_hit, latency_ms]
      properties:
        response:
          type: string
          description: The generated response
        cache_hit:
          type: boolean
          description: Whether this was served from cache
        similarity:
          type: number
          format: float

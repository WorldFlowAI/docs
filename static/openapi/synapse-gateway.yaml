  # ==========================================================================
  # Key Analytics Endpoints
  # ==========================================================================
  /api/v1/virtual-keys/{id}/analytics:
    get:
      summary: Get key usage analytics
      description: |
        Returns usage analytics with anomaly detection for a virtual key.
        Detects spend spikes (>3x baseline), request spikes (>5x baseline),
        and new model usage patterns.
      operationId: getKeyAnalytics
      tags: [Key Analytics]
      parameters:
        - name: id
          in: path
          required: true
          description: Virtual key ID
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          description: "Time period to analyze (default: 24h)"
          schema:
            type: string
            enum: ["1h", "6h", "24h", "7d", "30d"]
            default: "24h"
      responses:
        '200':
          description: Key usage analytics with anomaly detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyAnalyticsResponse'
        '400':
          description: Invalid period value
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Virtual key not found

  # ==========================================================================
  # OpenAI Compatible Endpoints (additional)
  # ==========================================================================
  /v1/embeddings:
    post:
      summary: Create embeddings
      description: |
        Generate embeddings for input text using the configured embedding service.
        Compatible with the OpenAI Embeddings API format. Supports single or batch
        input and optional Matryoshka dimension truncation.
      operationId: createEmbeddings
      tags: [OpenAI Compatible]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model:
                  type: string
                  description: "Model ID (e.g., text-embedding-ada-002)"
                input:
                  oneOf:
                    - type: string
                      description: Single text input
                    - type: array
                      items:
                        type: string
                      description: Batch of text inputs
                encoding_format:
                  type: string
                  description: "Encoding format (default: float)"
                dimensions:
                  type: integer
                  description: Number of output dimensions (for Matryoshka models)
                user:
                  type: string
                  description: User identifier
      responses:
        '200':
          description: Embeddings generated
          content:
            application/json:
              schema:
                type: object
                required: [object, data, model, usage]
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      type: object
                      required: [object, embedding, index]
                      properties:
                        object:
                          type: string
                          example: embedding
                        embedding:
                          type: array
                          items:
                            type: number
                            format: float
                        index:
                          type: integer
                  model:
                    type: string
                  usage:
                    type: object
                    required: [prompt_tokens, total_tokens]
                    properties:
                      prompt_tokens:
                        type: integer
                      total_tokens:
                        type: integer
        '400':
          description: Invalid input
        '500':
          description: Embedding generation failed

  /v1/completions:
    post:
      summary: Create completion (legacy)
      description: |
        Legacy text completion endpoint. Converts the prompt into a chat completion
        request internally and returns the result in the legacy completion response format.
        Compatible with the OpenAI Completions API.
      operationId: createCompletion
      tags: [OpenAI Compatible]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                  description: "Model ID (e.g., gpt-3.5-turbo-instruct)"
                prompt:
                  oneOf:
                    - type: string
                      description: Single prompt
                    - type: array
                      items:
                        type: string
                      description: Multiple prompts
                max_tokens:
                  type: integer
                  description: Maximum tokens to generate
                temperature:
                  type: number
                  format: float
                  description: "Temperature (0.0-2.0)"
                top_p:
                  type: number
                  format: float
                  description: Top-p sampling
                n:
                  type: integer
                  default: 1
                  description: Number of completions to generate
                stream:
                  type: boolean
                  default: false
                stop:
                  type: array
                  items:
                    type: string
                  description: Stop sequences
                presence_penalty:
                  type: number
                  format: float
                  description: "Presence penalty (-2.0 to 2.0)"
                frequency_penalty:
                  type: number
                  format: float
                  description: "Frequency penalty (-2.0 to 2.0)"
                user:
                  type: string
                  description: User identifier
                seed:
                  type: integer
                  format: int64
                  description: Seed for deterministic sampling
      responses:
        '200':
          description: Completion generated
          content:
            application/json:
              schema:
                type: object
                required: [id, object, created, model, choices, usage]
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    example: text_completion
                  created:
                    type: integer
                    format: int64
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      required: [text, index]
                      properties:
                        text:
                          type: string
                        index:
                          type: integer
                        logprobs:
                          type: object
                          nullable: true
                        finish_reason:
                          type: string
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
                  system_fingerprint:
                    type: string
        '400':
          description: Invalid prompt
        '500':
          description: Completion generation failed

  # ==========================================================================
  # Users Endpoints
  # ==========================================================================
  /api/v1/users:
    get:
      summary: List users

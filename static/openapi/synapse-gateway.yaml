  # ==========================================================================
  # Embedding Models API
  # ==========================================================================
  /api/v1/models/embeddings:
    get:
      summary: List Embedding Models
      description: |
        Returns the available embedding models with their capabilities including
        dimension, Matryoshka (MRL) dimensions, modality, and backend type.
        Used for client-side model selection.
      operationId: listEmbeddingModels
      tags: [Embedding Models]
      responses:
        '200':
          description: Available embedding models
          content:
            application/json:
              schema:
                type: object
                required: [models, defaultText]
                properties:
                  models:
                    type: array
                    items:
                      type: object
                      required: [id, dim, mrlDims, modality, backend, available]
                      properties:
                        id:
                          type: string
                          description: Model identifier (e.g., "bge-m3", "jina-v4").
                          example: bge-m3
                        dim:
                          type: integer
                          description: Native embedding dimension.
                          example: 1024
                        mrlDims:
                          type: array
                          description: Supported Matryoshka Representation Learning dimensions.
                          items:
                            type: integer
                          example: [256, 512, 768, 1024]
                        modality:
                          type: string
                          description: Input modality (text or multimodal).
                          enum: [text, multimodal]
                        backend:
                          type: string
                          description: Execution backend.
                          enum: [gpu-onnx, remote-http]
                        available:
                          type: boolean
                          description: Whether the model is currently available.
                  defaultText:
                    type: string
                    description: Default model for text embeddings.
                    example: bge-m3
                  defaultMultimodal:
                    type: string
                    nullable: true
                    description: Default model for multimodal embeddings.
                    example: jina-clip


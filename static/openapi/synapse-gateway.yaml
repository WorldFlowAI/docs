                $ref: '#/components/schemas/L2VectorConfigResponse'

  /admin/config/reload:
    x-internal: true
    post:
      summary: Reload Configuration from File
      description: Triggers a reload of the tenant configuration from the configured file path
      operationId: reloadConfig
      tags: [Admin]
      responses:
        '200':
          description: Configuration reloaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '500':
          description: Failed to reload configuration

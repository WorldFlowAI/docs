  # ==========================================================================
  # Usage API
  # ==========================================================================
  /api/v1/usage:
    get:
      summary: Get Unified Usage Statistics
      description: |
        Returns aggregated cache usage statistics across text and image modalities,
        scoped to the authenticated tenant. Includes per-provider breakdown for
        text usage and combined cross-modality summary.
      operationId: getUsageStats
      tags: [Usage]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Unified usage statistics
          content:
            application/json:
              schema:
                type: object
                required: [text, image, combined, period]
                properties:
                  text:
                    type: object
                    required: [totalRequests, cacheHits, hitRate, costSaved, avgLatencyMs, byProvider]
                    properties:
                      totalRequests:
                        type: integer
                      cacheHits:
                        type: integer
                      hitRate:
                        type: number
                        format: double
                      costSaved:
                        type: number
                        format: double
                      avgLatencyMs:
                        type: integer
                      byProvider:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            totalRequests:
                              type: integer
                            cacheHits:
                              type: integer
                            hitRate:
                              type: number
                              format: double
                            costSaved:
                              type: number
                              format: double
                  image:
                    type: object
                    required: [totalRequests, cacheHits, hitRate, costSaved]
                    properties:
                      totalRequests:
                        type: integer
                      cacheHits:
                        type: integer
                      hitRate:
                        type: number
                        format: double
                      costSaved:
                        type: number
                        format: double
                  combined:
                    type: object
                    required: [totalRequests, totalCostSaved, overallHitRate]
                    properties:
                      totalRequests:
                        type: integer
                      totalCostSaved:
                        type: number
                        format: double
                      overallHitRate:
                        type: number
                        format: double
                  period:
                    type: string
                    example: current_billing_cycle
        '401':
          description: Missing or invalid authentication
        '403':
          description: Insufficient permissions (requires ViewMetrics)

  # ==========================================================================
  # Agent Compatibility Endpoints
  # ==========================================================================
  /api/v1/check:
    get:
      summary: Agent Connectivity Check
      description: |
        Simple health check for AI agents that use Synapse as a proxy.
        Returns a healthy status so agents can confirm the base URL is reachable.
      operationId: agentCheck
      tags: [Agent Compatibility]
      security: []
      responses:
        '200':
          description: Healthy status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /v1/api/event_logging/batch:
    post:
      summary: Agent Telemetry Batch (v1 prefix)
      description: |
        Telemetry event sink for AI agents. Accepts batched telemetry events
        and acknowledges them without persisting. Agents that emit usage
        analytics to this endpoint receive a successful response.
      operationId: agentTelemetryV1
      tags: [Agent Compatibility]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '200':
          description: Events acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/event_logging/batch:
    post:
      summary: Agent Telemetry Batch (alternate prefix)
      description: |
        Alternate path for agent telemetry event sink. Same behavior as
        `/v1/api/event_logging/batch`.
      operationId: agentTelemetryAlt
      tags: [Agent Compatibility]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '200':
          description: Events acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /v1/messages/count_tokens:
    post:
      summary: Count Tokens (Estimate)
      description: |
        Returns an approximate token count based on character length
        (~4 characters per token). This is a rough estimate suitable
        for pre-flight budget checks, not billing. Accepts the same
        message format as the Anthropic Messages API.
      operationId: agentCountTokens
      tags: [Agent Compatibility]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                text:
                                  type: string
                system:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                model:
                  type: string
      responses:
        '200':
          description: Token count estimate
          content:
            application/json:
              schema:
                type: object
                properties:
                  input_tokens:
                    type: integer
                    description: Estimated token count.

  /api/v1/rpc:
    post:
      summary: Agent Internal RPC
      description: |
        Internal RPC stub for AI agents. Some agents issue internal RPC calls
        against the base URL. Returns a null result to indicate no special handling.
      operationId: agentRpc
      tags: [Agent Compatibility]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                params:
                  type: object
      responses:
        '200':
          description: RPC result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    nullable: true


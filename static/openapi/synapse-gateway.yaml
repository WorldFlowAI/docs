  /api/v1/sso/connections:
    get:
      summary: List SSO connections
      description: List SSO connections for the authenticated workspace with optional filtering by protocol, status, or name.
      operationId: listSsoConnections
      tags: [SSO]
      parameters:
        - name: protocol
          in: query
          description: Filter by SSO protocol
          schema:
            type: string
            enum: [oidc, saml]
        - name: status
          in: query
          description: Filter by connection status
          schema:
            type: string
            enum: [active, inactive, testing, error]
        - name: name
          in: query
          description: Search by name (partial match)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Paginated list of SSO connections
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SsoConnectionResponse'
                  pagination:
                    $ref: '#/components/schemas/SsoPaginationMeta'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
    post:
      summary: Create SSO connection
      description: Create a new SSO connection (OIDC or SAML). The connection is created in INACTIVE status.
      operationId: createSsoConnection
      tags: [SSO]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSsoConnectionRequest'
      responses:
        '200':
          description: SSO connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoConnectionResponse'
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '409':
          description: Connection with this name already exists

  /api/v1/sso/connections/{id}:
    get:
      summary: Get SSO connection
      description: Get a single SSO connection by ID with associated domains.
      operationId: getSsoConnection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSO connection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoConnectionResponse'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Connection not found
    put:
      summary: Update SSO connection
      description: Update an existing SSO connection. Only provided fields are updated.
      operationId: updateSsoConnection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSsoConnectionRequest'
      responses:
        '200':
          description: SSO connection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoConnectionResponse'
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Connection not found
    delete:
      summary: Delete SSO connection
      description: Soft-delete an SSO connection.
      operationId: deleteSsoConnection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Connection deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Connection not found


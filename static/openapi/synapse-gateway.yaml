  - name: Routing
    description: Multi-LLM cost-optimizer routing configuration, decisions, analytics, and quality feedback
  - name: Model Catalog
    description: LLM provider integrations, provider configurations, and model definitions
  - name: Chains
    description: Sequential multi-model pipeline management and execution
  - name: Prompts
    description: Prompt template management with version control, variable extraction, and execution
  - name: Folders
    description: Prompt folder organization
  - name: Keys

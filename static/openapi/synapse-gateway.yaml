    get:
      summary: Audit Event Stream (WebSocket)
      description: |
        Real-time WebSocket stream of audit events with subscription filtering.
        Max 100 concurrent connections. Connect via WebSocket upgrade with token query parameter.
      operationId: auditStream
      tags: [Audit]
      parameters:
        - name: token
          in: query
          description: JWT token for WebSocket authentication
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade)
        '400':
          description: WebSocket upgrade required


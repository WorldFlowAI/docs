  /admin/l2/config:
    x-internal: true
    put:
      summary: Update L2 Runtime Configuration
      description: |
        Update L2 runtime configuration. Only runtime-safe parameters can be updated:
        - ef_search: HNSW search depth
        - refiner settings: enabled, refine_k

        Parameters that require index rebuild (m, ef_construction, quantization) cannot be updated.
      operationId: updateL2Config
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/L2RuntimeConfigUpdate'
            example:
              ef_search: 128
              refiner:
                enabled: true
                refine_k: 4.0
      responses:
        '200':
          description: L2 configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '400':
          description: Invalid configuration or parameter requires index rebuild
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'

  /admin/tenants/{tenant_id}/config:

    post:
      summary: Test SSO connection
      description: |
        Test an SSO connection configuration. For OIDC, validates discovery
        and JWKS endpoints. For SAML, validates certificate and metadata.
        Updates connection status to TESTING on success or ERROR on failure.
      operationId: testSsoConnection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Test result
          content:
